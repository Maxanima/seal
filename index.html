<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Magical Seal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&family=MedievalSharp&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #04040a;
  --surface: #0c0c18;
  --surface2: #111122;
  --surface3: #181830;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --gold: #c8a96e;
  --gold-light: #f0d090;
  --gold-dim: #8a6a30;
  --cyan: #00d4ff;
  --green: #00ff88;
  --purple: #9b59ff;
  --red: #ff4466;
  --text: #e8e0d0;
  --text-dim: #6a6060;
  --text-mid: #9a9090;
  --radius: 12px;
  --seal-glow: rgba(200,169,110,0.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Cinzel',Georgia,serif;color:var(--text);overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent}

/* STARS BG */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
  radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
  radial-gradient(1px 1px at 40% 30%, rgba(200,169,110,0.5) 0%, transparent 100%),
  radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
  radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.2) 0%, transparent 100%),
  radial-gradient(1px 1px at 85% 70%, rgba(0,212,255,0.4) 0%, transparent 100%),
  radial-gradient(1px 1px at 15% 85%, rgba(155,89,255,0.4) 0%, transparent 100%),
  radial-gradient(1px 1px at 92% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
  radial-gradient(1px 1px at 62% 55%, rgba(255,255,255,0.15) 0%, transparent 100%),
  radial-gradient(1px 1px at 78% 90%, rgba(255,255,255,0.25) 0%, transparent 100%);
pointer-events:none;z-index:0}

/* TOP BAR */
#top-bar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(180deg,rgba(4,4,10,0.98) 0%,transparent 100%);border-bottom:1px solid var(--border)}
#player-info{display:flex;align-items:center;gap:10px}
#avatar-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;cursor:pointer;flex-shrink:0;box-shadow:0 0 12px rgba(200,169,110,0.35);transition:box-shadow 0.2s}
#avatar-btn:hover{box-shadow:0 0 22px rgba(200,169,110,0.6)}
#avatar-btn img{width:100%;height:100%;object-fit:cover}
.info-block{display:flex;flex-direction:column;gap:2px}
.info-label{font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}
.info-val{font-size:12px;font-weight:700;color:var(--gold-light);font-family:'Cinzel',serif}

/* XP BAR */
#xp-bar-wrap{height:3px;background:rgba(200,169,110,0.15);border-radius:2px;width:80px;margin-top:3px}
#xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width 0.4s ease}

/* RESOURCES */
#resources-bar{display:flex;align-items:center;gap:8px}
.res-pill{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:20px;padding:5px 10px}
.res-pill svg{width:18px;height:18px;flex-shrink:0}
.res-val{font-size:13px;font-weight:700}
#sphere-count{color:var(--cyan);text-shadow:0 0 8px rgba(0,212,255,0.5)}
#seal-amount{color:var(--green);text-shadow:0 0 8px rgba(0,255,136,0.4)}

/* STREAK */
#streak-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:#ff8844;letter-spacing:1px;background:rgba(255,100,30,0.1);border:1px solid rgba(255,100,30,0.25);border-radius:12px;padding:3px 8px;transition:all 0.3s}
#streak-badge.hot{border-color:rgba(255,150,50,0.5);box-shadow:0 0 10px rgba(255,100,30,0.3)}

/* RUNE TOGGLE */
#rune-toggle-btn{position:fixed;top:62px;right:14px;z-index:51;width:32px;height:32px;border-radius:50%;background:rgba(4,4,10,0.7);border:1px solid rgba(200,169,110,0.3);color:var(--gold);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s;backdrop-filter:blur(6px);box-shadow:0 0 10px rgba(200,169,110,0.1)}
#rune-toggle-btn:hover{border-color:rgba(200,169,110,0.6);box-shadow:0 0 18px rgba(200,169,110,0.25)}
#rune-toggle-btn.runes-hidden{border-color:var(--border);color:var(--text-dim);box-shadow:none;opacity:0.55}
#rune-slots-ring{transition:opacity 0.35s ease}
#rune-slots-ring.hidden{opacity:0;pointer-events:none}

/* CANVAS */
#canvas-wrap{position:fixed;top:96px;bottom:72px;left:0;right:0;display:flex;align-items:center;justify-content:center;z-index:1}
#canvas-inner{position:relative;display:flex;align-items:center;justify-content:center}
#sealCanvas{display:block;cursor:pointer;border-radius:50%;transition:filter 0.3s;filter:drop-shadow(0 0 30px rgba(200,169,110,0.08))}
#sealCanvas:active{filter:brightness(1.2) drop-shadow(0 0 40px rgba(200,169,110,0.25))}

/* CLICK PARTICLES */
.particle{position:fixed;pointer-events:none;z-index:60;font-size:14px;font-weight:700;animation:particleFly 1.2s ease-out forwards;white-space:nowrap}
@keyframes particleFly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(0.5)}}

/* HINT */
#click-hint{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;pointer-events:none;animation:pulseHint 2.5s ease-in-out infinite}
@keyframes pulseHint{0%,100%{opacity:0.3}50%{opacity:0.7}}

/* COMBO */
#combo-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:55;text-align:center;opacity:0;transition:opacity 0.2s}
#combo-display.show{opacity:1}
#combo-text{font-family:'Cinzel Decorative',serif;font-size:clamp(14px,4vw,22px);font-weight:700;letter-spacing:2px;animation:comboPop 0.35s ease}
@keyframes comboPop{0%{transform:scale(0.4) translateY(20px);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}

/* RUNE SLOTS RING */
#rune-slots-ring{position:absolute;top:50%;left:50%;width:0;height:0;pointer-events:none;z-index:2}
.rune-slot-el{position:absolute;width:46px;height:46px;border-radius:50%;border:1.5px dashed rgba(200,169,110,0.2);background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);transition:border-color 0.3s,box-shadow 0.3s;backdrop-filter:blur(4px)}
.rune-slot-el.filled{border-style:solid;border-color:var(--rune-color,#fff);box-shadow:0 0 18px color-mix(in srgb,var(--rune-color,#fff) 50%,transparent),inset 0 0 10px color-mix(in srgb,var(--rune-color,#fff) 15%,transparent)}
.slot-symbol{font-size:1.3em;line-height:1;color:var(--rune-color,rgba(255,255,255,0.15));text-shadow:0 0 12px var(--rune-color,transparent);transition:all 0.3s}

/* BOTTOM NAV */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:space-around;align-items:center;padding:6px 4px 10px;background:linear-gradient(0deg,rgba(4,4,10,0.98) 0%,transparent 100%);border-top:1px solid var(--border)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text-dim);font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;cursor:pointer;padding:4px 10px;border-radius:8px;transition:color 0.2s,background 0.2s;text-transform:uppercase;position:relative}
.nav-btn .nav-icon{font-size:20px;transition:transform 0.2s}
.nav-btn:hover,.nav-btn.active{color:var(--gold)}
.nav-btn:hover .nav-icon{transform:translateY(-2px)}
.nav-badge{position:absolute;top:1px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);display:none}
.nav-badge.show{display:block}

/* PANELS */
.panel-overlay{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
.panel-overlay.open{display:flex}
.panel{width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border2);border-radius:22px 22px 0 0;padding:0 18px 36px;max-height:80vh;overflow-y:auto;animation:slideUp 0.28s ease;position:relative}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.panel-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 18px}
.panel-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;line-height:1;padding:4px}
.panel h2{font-family:'Cinzel Decorative',serif;font-size:15px;letter-spacing:2px;color:var(--gold);margin-bottom:18px;text-align:center}
.panel-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface2);border-radius:10px;padding:4px}
.ptab{flex:1;background:none;border:none;color:var(--text-dim);font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;padding:7px 4px;border-radius:7px;cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.ptab.active{background:var(--surface3);color:var(--gold);border:1px solid rgba(200,169,110,0.2)}

/* RUNE CARD (collection) */
.rune-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.rune-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.rune-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.3s}
.rune-card.owned{border-color:color-mix(in srgb,var(--rc) 40%,transparent);box-shadow:0 0 16px color-mix(in srgb,var(--rc) 15%,transparent)}
.rune-card.owned::before{background:radial-gradient(ellipse at 50% 0%,color-mix(in srgb,var(--rc) 12%,transparent) 0%,transparent 70%);opacity:1}
.rune-card.equipped{border-color:color-mix(in srgb,var(--rc) 70%,transparent);box-shadow:0 0 20px color-mix(in srgb,var(--rc) 25%,transparent)}
.rune-card:not(.owned){opacity:0.4;filter:grayscale(0.8);cursor:default}
.rune-card:not(.owned):hover{transform:none;box-shadow:none}
.rune-card.owned:hover{transform:translateY(-3px);box-shadow:0 8px 24px color-mix(in srgb,var(--rc) 25%,transparent)}
.rune-symbol{font-size:2.2em;line-height:1;text-shadow:0 0 16px var(--rc)}
.rune-card:not(.owned) .rune-symbol{color:rgba(255,255,255,0.15);text-shadow:none}
.rune-card.owned .rune-symbol{color:var(--rc)}
.rune-name{font-size:10px;letter-spacing:1px;color:var(--text-mid);text-transform:uppercase}
.rune-card.owned .rune-name{color:var(--text)}
.rune-rarity-dot{width:6px;height:6px;border-radius:50%;background:var(--rc)}
.rune-card:not(.owned) .rune-rarity-dot{background:rgba(255,255,255,0.15)}
.equipped-badge{position:absolute;top:6px;right:6px;font-size:8px;letter-spacing:1px;background:rgba(0,0,0,0.6);color:var(--rc);border:1px solid color-mix(in srgb,var(--rc) 50%,transparent);border-radius:4px;padding:2px 5px}
.lock-badge{position:absolute;top:6px;left:6px;font-size:10px;opacity:0.3}

/* RUNE FILTER BAR */
.filter-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.filter-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text-dim);font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;padding:5px 12px;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;text-transform:uppercase}
.filter-btn.active{background:rgba(200,169,110,0.12);border-color:rgba(200,169,110,0.35);color:var(--gold)}

/* RUNE DETAIL PANEL */
#rune-detail{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:18px;margin-top:12px;display:none}
#rune-detail.open{display:block;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rd-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.rd-symbol{font-size:2.8em;line-height:1}
.rd-info .rd-name{font-size:16px;font-weight:700;color:var(--gold-light)}
.rd-info .rd-rarity{font-size:10px;letter-spacing:2px;margin-top:3px}
.rd-info .rd-bonus{font-size:12px;color:var(--text-mid);margin-top:5px}
.rd-actions{display:flex;gap:8px;flex-wrap:wrap}
.rd-btn{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:1px;padding:8px 16px;border-radius:8px;cursor:pointer;border:1px solid;transition:all 0.2s;text-transform:uppercase}
.rd-equip{background:rgba(200,169,110,0.1);border-color:rgba(200,169,110,0.35);color:var(--gold)}
.rd-equip:hover{background:rgba(200,169,110,0.2);box-shadow:0 0 12px rgba(200,169,110,0.2)}
.rd-unequip{background:rgba(155,89,255,0.1);border-color:rgba(155,89,255,0.35);color:var(--purple)}
.rd-delete{background:rgba(255,68,102,0.08);border-color:rgba(255,68,102,0.3);color:var(--red)}
.rd-delete:hover{background:rgba(255,68,102,0.18);box-shadow:0 0 10px rgba(255,68,102,0.2)}
.slot-selector{display:flex;gap:8px;align-items:center;margin-top:10px}
.slot-picker{width:44px;height:44px;border-radius:50%;border:1.5px dashed var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.4em;transition:all 0.2s}
.slot-picker:hover{border-style:solid;transform:scale(1.1)}
.slot-picker.has-rune{border-style:solid}
.slot-picker-label{font-size:10px;color:var(--text-dim);letter-spacing:1px}

/* SHOP */
.shop-section-title{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin:16px 0 10px;padding-left:2px}
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);margin-bottom:7px;transition:border-color 0.2s}
.shop-item:hover{border-color:var(--border2)}
.shop-item .item-info{display:flex;flex-direction:column;gap:3px}
.shop-item .item-name{font-size:13px;color:var(--text)}
.shop-item .item-desc{font-size:10px;color:var(--text-dim)}
.shop-item .item-price{font-size:11px;color:var(--cyan);font-weight:700}
.shop-btn{background:linear-gradient(135deg,rgba(0,212,255,0.12),rgba(0,212,255,0.04));border:1px solid rgba(0,212,255,0.25);color:var(--cyan);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:1px;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all 0.2s}
.shop-btn:hover{background:rgba(0,212,255,0.22);box-shadow:0 0 14px rgba(0,212,255,0.25)}

/* BOOSTER SHOP */
.booster-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);margin-bottom:7px}
.booster-icon{font-size:26px;flex-shrink:0;width:42px;text-align:center}
.booster-info{flex:1}
.booster-name{font-size:12px;font-weight:700;color:var(--text)}
.booster-desc{font-size:10px;color:var(--text-dim);margin-top:2px}
.booster-price{font-size:10px;color:var(--gold);font-weight:700;margin-top:4px}
.booster-btn{background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.25);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.booster-btn:hover{background:rgba(200,169,110,0.2)}

/* QUESTS */
.quest-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);margin-bottom:8px;position:relative;overflow:hidden}
.quest-item.complete{border-color:rgba(0,255,136,0.3)}
.quest-progress-bg{position:absolute;inset:0;background:rgba(0,255,136,0.04);transform-origin:left;transition:transform 0.5s}
.quest-icon{font-size:20px;flex-shrink:0;z-index:1}
.quest-body{flex:1;z-index:1}
.quest-text{font-size:11px;color:var(--text)}
.quest-prog{font-size:10px;color:var(--text-dim);margin-top:3px}
.quest-reward{font-size:11px;color:var(--gold);font-weight:700;z-index:1;flex-shrink:0}
.quest-done{font-size:16px;z-index:1}
.claim-btn{background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(0,255,136,0.05));border:1px solid rgba(0,255,136,0.3);color:var(--green);font-family:'Cinzel',serif;font-size:9px;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer;transition:all 0.2s;z-index:1}
.claim-btn:hover{background:rgba(0,255,136,0.25)}

/* PROFILE */
#profile-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:14px}
#profile-header img{width:56px;height:56px;border-radius:50%;border:2px solid var(--gold);box-shadow:0 0 16px rgba(200,169,110,0.3)}
.profile-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--sc-color,var(--gold));opacity:0.6}
.sc-val{font-size:20px;font-weight:700;color:var(--sc-color,var(--gold));text-shadow:0 0 10px color-mix(in srgb,var(--sc-color,var(--gold)) 40%,transparent)}
.sc-label{font-size:9px;color:var(--text-dim);margin-top:4px;letter-spacing:1px;text-transform:uppercase}

/* CHESTS */
.chest-row{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;background:var(--surface2);border:1px solid var(--border);margin-bottom:10px;transition:border-color 0.2s}
.chest-icon{font-size:34px;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(155,89,255,0.4))}
.chest-info{flex:1}
.chest-name{font-size:13px;font-weight:700;color:var(--text)}
.chest-rarity{font-size:9px;letter-spacing:1px;margin-top:2px;text-transform:uppercase}
.chest-count{font-size:10px;color:var(--text-dim);margin-top:5px}
.chest-btns{display:flex;gap:6px;flex-direction:column}
.chest-open-btn{font-family:'Cinzel',serif;font-size:9px;font-weight:700;padding:6px 12px;border-radius:7px;cursor:pointer;border:1px solid rgba(155,89,255,0.4);background:rgba(155,89,255,0.1);color:var(--purple);transition:all 0.2s;letter-spacing:0.5px}
.chest-open-btn:hover{background:rgba(155,89,255,0.22)}
.chest-open-btn:disabled{opacity:0.4;cursor:default}
.chest-buy-btn{font-family:'Cinzel',serif;font-size:9px;font-weight:700;padding:6px 12px;border-radius:7px;cursor:pointer;border:1px solid rgba(200,169,110,0.3);background:rgba(200,169,110,0.08);color:var(--gold);transition:all 0.2s;letter-spacing:0.5px}
.chest-buy-btn:hover{background:rgba(200,169,110,0.18)}
#chest-result{text-align:center;padding:18px 14px;margin-top:10px;border-radius:12px;background:var(--surface2);border:1px solid;display:none}
.cr-symbol{font-size:3em;margin-bottom:6px;animation:popIn 0.4s ease}
@keyframes popIn{0%{transform:scale(0.2) rotate(-20deg);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.cr-name{font-size:15px;font-weight:700;margin-bottom:4px}
.cr-bonus{font-size:11px;color:var(--text-dim)}

/* RARITY FLASH */
#rarity-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:65;text-align:center;opacity:0;transition:opacity 0.3s}
#rarity-flash.show{opacity:1}
.rf-bg{position:absolute;inset:-40px -60px;border-radius:50%;filter:blur(40px);opacity:0.15;animation:rfPulse 0.5s ease}
@keyframes rfPulse{0%{transform:scale(0.3);opacity:0}100%{transform:scale(1);opacity:0.15}}
.rf-title{font-family:'Cinzel Decorative',serif;font-size:clamp(16px,5vw,26px);font-weight:700;letter-spacing:2px;text-shadow:0 0 30px currentColor;animation:rfScale 0.4s ease;position:relative}
.rf-sub{font-size:10px;letter-spacing:3px;opacity:0.65;margin-top:5px;position:relative}
@keyframes rfScale{0%{transform:scale(0.4);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* BOOSTER ACTIVE */
#booster-hud{position:fixed;top:100px;left:14px;z-index:40;display:none;flex-direction:column;gap:4px}
#booster-hud.show{display:flex}
.booster-active-pill{display:flex;align-items:center;gap:6px;background:rgba(155,89,255,0.12);border:1px solid rgba(155,89,255,0.3);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--purple);animation:bPillIn 0.3s ease}

/* MINING */
#mining-section{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.mining-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mining-title{font-size:12px;letter-spacing:2px;color:var(--text-mid);text-transform:uppercase}

#mining-btn:hover:not([disabled]){background:rgba(0,255,136,0.2);box-shadow:0 0 14px rgba(0,255,136,0.3)}
#mining-btn[disabled]{color:var(--text-dim);border-color:var(--border);cursor:default;background:var(--surface)}
#mining-progress-bar{height:4px;background:rgba(0,255,136,0.1);border-radius:2px;margin-top:4px}
#mining-fill{height:100%;background:linear-gradient(90deg,rgba(0,255,136,0.5),var(--green));border-radius:2px;width:100%;transition:width 1s linear}

/* DELETE CONFIRM */
#delete-confirm{background:rgba(255,68,102,0.06);border:1px solid rgba(255,68,102,0.25);border-radius:10px;padding:12px 16px;margin-top:8px;display:none;animation:fadeIn 0.2s ease}
#delete-confirm.open{display:block}
.dc-text{font-size:11px;color:var(--text-mid);margin-bottom:10px}
.dc-btns{display:flex;gap:8px}
.dc-yes{background:rgba(255,68,102,0.15);border:1px solid rgba(255,68,102,0.4);color:var(--red);font-family:'Cinzel',serif;font-size:10px;font-weight:700;padding:7px 14px;border-radius:7px;cursor:pointer;transition:all 0.2s;flex:1}
.dc-yes:hover{background:rgba(255,68,102,0.3)}
.dc-no{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'Cinzel',serif;font-size:10px;padding:7px 14px;border-radius:7px;cursor:pointer;transition:all 0.2s;flex:1}
.dc-no:hover{border-color:var(--border2);color:var(--text)}

/* PAYMENT MODAL */
#payment-overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center}
#payment-overlay.open{display:flex}
#payment-modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:28px 28px 24px;text-align:center;width:290px;animation:modalPop 0.3s ease}
@keyframes modalPop{from{transform:scale(0.75);opacity:0}to{transform:scale(1);opacity:1}}
#payment-modal h3{font-size:13px;letter-spacing:2px;color:var(--gold);margin-bottom:10px}
.pm-spheres{font-size:32px;font-weight:700;color:var(--cyan);text-shadow:0 0 14px var(--cyan);margin-bottom:4px}
.pm-detail{font-size:12px;color:var(--text-dim);margin-bottom:22px}
.pm-btns{display:flex;gap:10px;justify-content:center}
.pm-confirm{background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(0,212,255,0.06));border:1px solid rgba(0,212,255,0.4);color:var(--cyan);font-family:'Cinzel',serif;font-size:12px;font-weight:700;padding:10px 22px;border-radius:9px;cursor:pointer;transition:all 0.2s}
.pm-confirm:hover{background:rgba(0,212,255,0.3)}
.pm-confirm:disabled{opacity:0.5;cursor:default}
.pm-cancel{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'Cinzel',serif;font-size:12px;padding:10px 22px;border-radius:9px;cursor:pointer;transition:all 0.2s}
.pm-cancel:hover{border-color:var(--border2);color:var(--text)}
#pm-result{font-size:12px;color:var(--green);margin-top:12px;min-height:18px}

/* TOAST */
#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);z-index:90;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:8px 18px;font-size:11px;color:var(--text);letter-spacing:1px;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>

  {id:14,symbol:'᛬',name:'Starweave',rarity:'Epic',color:'#ffd6ff',bonus:'+30 XP per tap',effect:'xpBonus',value:30,lore:'Woven from the light of distant stars.'},
  {id:15,symbol:'᛭',name:'Ether',rarity:'Epic',color:'#a7ffeb',bonus:'+30% sphere reward',effect:'sphereBonus',value:0.30,lore:'Pure quintessence made manifest.'},
  {id:16,symbol:'ᛮ',name:'Lux',rarity:'Epic',color:'#fff176',bonus:'+30% mining yield',effect:'miningYield',value:0.30,lore:'Condensed luminance of creation.'},
  {id:17,symbol:'ᚺ',name:'Nova',rarity:'Epic',color:'#ff80ab',bonus:'+5 bonus spheres chance 25%',effect:'sphereClick',value:5,lore:'Born from the death of ancient stars.'},
  {id:18,symbol:'ᛝ',name:'Aurora',rarity:'Epic',color:'#00e6ff',bonus:'-25% shop cost',effect:'shopDiscount',value:0.25,lore:'The celestial dance of charged light.'},
];
const RARITY_ORDER = {Common:0,Rare:1,Epic:2};
const RARITY_COLORS = {Common:'#88aacc',Rare:'#ffd700',Epic:'#a855f7'};

const CHESTS = [
  {type:'common',label:'Common Chest',icon:'📦',color:'#aabbcc',pool:['Common','Rare'],chances:[0.85,0.15],price:5,currency:'spheres'},
  {type:'rare',label:'Rare Chest',icon:'💎',color:'#00d4ff',pool:['Rare','Epic'],chances:[0.75,0.25],price:20,currency:'spheres'},

];

const BOOSTERS = [
  {id:'double_seal',icon:'💎',name:'Double Seal',desc:'2× $SEAL for 10 minutes',price:15,currency:'spheres',duration:600},
  {id:'xp_rush',icon:'⚡',name:'XP Rush',desc:'3× XP for 5 minutes',price:10,currency:'spheres',duration:300},

];

// ── LOAD/SAVE ─────────────────────────────────────────────────────────────
function save(){
  localStorage.setItem('ms2_state',JSON.stringify({
    spheres,xp,level,seal,stats,userRunes,userRuneSlots,userChests,
    questProgress,questClaimed,activeBoosters,currentStreak
  }));
}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem('ms2_state'));
    if(!s)return;
    spheres=s.spheres??100; xp=s.xp??0; level=s.level??1; seal=s.seal??0;
    stats=s.stats??{total:0,rare:0,mythic:0,legendary:0,ethereal:0,chestsOpened:0,runesEquipped:0,maxStreak:0};
    if(!stats.chestsOpened)stats.chestsOpened=0;
    if(!stats.runesEquipped)stats.runesEquipped=0;
    if(!stats.maxStreak)stats.maxStreak=0;
    userRunes=s.userRunes??[]; userRuneSlots=s.userRuneSlots??[null,null,null];
    userChests=s.userChests??{common:0,rare:0,epic:0};
    questProgress=s.questProgress??{}; questClaimed=s.questClaimed??{};
    activeBoosters=s.activeBoosters??{}; currentStreak=s.currentStreak??0;
    // Clean expired boosters
    const now=Date.now();
    Object.keys(activeBoosters).forEach(k=>{if(activeBoosters[k].end<now)delete activeBoosters[k]});
  }catch(e){}
}
load();
setInterval(save,10000);
window.addEventListener('beforeunload',save);

const comboBg=document.getElementById('combo-bg');

// ── CANVAS RESIZE ──────────────────────────────────────────────────────────
function resizeCanvas(){
  const avail=Math.min(window.innerWidth*0.88,window.innerHeight-190,400);
  const dpr=window.devicePixelRatio||1;
  canvas.width=avail*dpr; canvas.height=avail*dpr;
  canvas.style.width=avail+'px'; canvas.style.height=avail+'px';
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

// ── DRAW ───────────────────────────────────────────────────────────────────
function drawShape(type,x,y,size,color,rot,glow,dpr){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  ctx.lineWidth=5*dpr; ctx.strokeStyle=color;
  ctx.shadowColor=color; ctx.shadowBlur=24*glow*dpr;
  ctx.beginPath();
  if(type==='circle'){
    ctx.arc(0,0,size/2,0,Math.PI*2);
  }else if(type==='triangle'){
    for(let i=0;i<3;i++){const a=i*2*Math.PI/3-Math.PI/2;const r=size/Math.sqrt(3);i===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a))}
    ctx.closePath();
  }else if(type==='pentagon'){
    for(let i=0;i<5;i++){const a=i*2*Math.PI/5-Math.PI/2;const r=size/2;i===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a))}
    ctx.closePath();
  }else{
    const s=size/Math.sqrt(2);ctx.rect(-s/2,-s/2,s,s);
  }
  ctx.stroke(); ctx.restore();
}

// Center symbol
function drawCenterSymbol(){
  if(!runesVisible)return;
  if(userRuneSlots.filter(Boolean).length===0)return;
  const dpr=window.devicePixelRatio||1;
  const cx=canvas.width/2,cy=canvas.height/2;
  const equippedRunes=userRuneSlots.filter(Boolean).map(id=>RUNES.find(r=>r.id===id)).filter(Boolean);
  if(equippedRunes.length===0)return;
  const r=equippedRunes[0];
  ctx.save();
  ctx.font=`${28*dpr}px Cinzel`;
  ctx.fillStyle=r.color;
  ctx.shadowColor=r.color; ctx.shadowBlur=20*dpr;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.globalAlpha=0.4+0.2*Math.sin(Date.now()/800);
  ctx.fillText(r.symbol,cx,cy);
  ctx.restore();
}

let time=0;
function render(){
  resizeCanvas();
  const dpr=window.devicePixelRatio||1;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/2,cy=canvas.height/2;
  const scale=(canvas.width/(500*dpr))*1.3;
  const glow=0.65+0.35*Math.sin(time*Math.PI*2/3.5);
  for(const f of sealFigures){
    f.rotation+=f.speed*f.direction;
    drawShape(f.type,cx,cy,f.size*scale*dpr,f.color,f.rotation,glow,dpr);
  }
  drawCenterSymbol();
  time+=1/60;
  runeRotAngle+=0.005;
  if(runesVisible)updateRuneSlotsRing();
  requestAnimationFrame(render);
}

// ── RUNE SLOTS RING ────────────────────────────────────────────────────────
function buildRuneSlotsRing(){
  slotsRing.innerHTML='';
  for(let i=0;i<3;i++){
    const el=document.createElement('div');
    el.className='rune-slot-el';
    el.dataset.idx=i;
    el.innerHTML='<span class="slot-symbol">○</span>';
    slotsRing.appendChild(el);
  }
}
function updateRuneSlotsRing(){
  const els=slotsRing.querySelectorAll('.rune-slot-el');
  const cw=canvas.offsetWidth,ch=canvas.offsetHeight;
  const radius=(Math.min(cw,ch)/2)*0.7+26;
  els.forEach((el,i)=>{
    const angle=runeRotAngle+(Math.PI*2*i/3);
    el.style.left=Math.cos(angle)*radius+'px';
    el.style.top=Math.sin(angle)*radius+'px';
    const runeId=userRuneSlots[i];
    const rune=runeId?RUNES.find(r=>r.id===runeId):null;
    if(rune){
      el.classList.add('filled');
      el.style.setProperty('--rune-color',rune.color);
      el.querySelector('.slot-symbol').textContent=rune.symbol;
      el.querySelector('.slot-symbol').style.color=rune.color;
    }else{
      el.classList.remove('filled');
      el.style.removeProperty('--rune-color');
      el.querySelector('.slot-symbol').textContent='○';
      el.querySelector('.slot-symbol').style.color='';
    }
  });
}

// ── BONUS HELPERS ──────────────────────────────────────────────────────────
function getBonus(effect){
  return userRuneSlots.reduce((sum,id)=>{
    if(!id)return sum;
    const r=RUNES.find(x=>x.id===id);
    return r&&r.effect===effect?sum+r.value:sum;
  },0);
}
function boosterActive(id){
  return activeBoosters[id]&&activeBoosters[id].end>Date.now();
}
function getDiscount(){
  const disc=getBonus('shopDiscount');
  return Math.min(disc,0.5);
}

// ── SEAL GENERATION ────────────────────────────────────────────────────────
function generateSeal(){
  sealFigures=Array.from({length:4},()=>({
    type:SHAPES[Math.floor(Math.random()*SHAPES.length)],
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    size:SIZES[Math.floor(Math.random()*SIZES.length)],
    speed:SPEEDS[Math.floor(Math.random()*SPEEDS.length)],
    direction:Math.random()<0.5?1:-1,
    rotation:Math.random()*Math.PI*2,
  }));
  stats.total++;
  const rarity=checkRarity();
  updateStreak(rarity);
  checkQuests();
  updateHUD();
}

function checkRarity(){
  const luckMult=boosterActive('lucky_tap')?2:1;
  const countMap=(key)=>{const m={};for(const f of sealFigures)m[f[key]]=(m[f[key]]||0)+1;return Math.max(...Object.values(m))};
  const cm=countMap('color'),tm=countMap('type');
  const sealBonus=getBonus('sealBonus');
  const sealMult=boosterActive('double_seal')?2:1;
  let rarity='common';
  if(cm===4&&tm===4){
    stats.ethereal++; seal+=1*(1+sealBonus)*sealMult;
    flashRarity('✦ ETHEREAL SEAL ✦','#b0e0ff','All matches · 0.02% chance');
    spawnParticles('✦','#b0e0ff',6); rarity='ethereal';
  }else if(cm===3&&tm===3){
    stats.legendary++; seal+=0.1*(1+sealBonus)*sealMult;
    flashRarity('⊛ LEGENDARY ⊛','#ffd700','Triple match · 0.2% chance');
    spawnParticles('★','#ffd700',4); rarity='legendary';
  }else if((cm===4||tm===4)*luckMult){
    const r=Math.random();
    if(r<(0.005*luckMult)){stats.mythic++;seal+=0.01*(1+sealBonus)*sealMult;flashRarity('◈ MYTHIC ◈','#c084fc','Quad match · 0.5%');spawnParticles('◈','#c084fc',3);rarity='mythic';}
    else if(r<(0.02*luckMult)){stats.rare++;seal+=0.001*(1+sealBonus)*sealMult;flashRarity('✧ RARE ✧','#00d4ff','Triple form · 2%');spawnParticles('✧','#00d4ff',2);rarity='rare';}
  }else if((cm===3||tm===3)*luckMult&&Math.random()<(0.02*luckMult)){
    stats.rare++;seal+=0.001*(1+sealBonus)*sealMult;
    flashRarity('✧ RARE ✧','#00d4ff','Shape match · 2%');
    spawnParticles('✧','#00d4ff',2); rarity='rare';
  }
  updateSeal();
  return rarity;
}

// ── STREAK ─────────────────────────────────────────────────────────────────
function updateStreak(rarity){
  if(rarity==='common'){
    currentStreak=0;
  }else{
    currentStreak++;
    if(currentStreak>stats.maxStreak)stats.maxStreak=currentStreak;
    if(currentStreak>=3){
      showCombo(currentStreak,rarity);
    }
  }
  streakEl.textContent=currentStreak;
  streakBadge.classList.toggle('hot',currentStreak>=3);
}

function showCombo(streak,rarity){
  const colors={rare:'#00d4ff',mythic:'#c084fc',legendary:'#ffd700',ethereal:'#b0e0ff'};
  const col=colors[rarity]||'#ffffff';
  comboText.textContent=`${streak}× CHAIN!`;
  comboText.style.color=col;
  comboBg.style.background=col;
  comboEl.classList.add('show');
  setTimeout(()=>comboEl.classList.remove('show'),1800);
}

// ── PARTICLES ──────────────────────────────────────────────────────────────
function spawnParticles(symbol,color,count){
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.textContent=symbol;
    p.style.color=color;
    p.style.left=(window.innerWidth/2+((Math.random()-0.5)*80))+'px';
    p.style.top=(window.innerHeight/2+((Math.random()-0.5)*60))+'px';
    p.style.animationDelay=(i*0.1)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1500);
  }
}

// ── CLICK ──────────────────────────────────────────────────────────────────
canvas.addEventListener('click',(e)=>{
  if(spheres<=0){showToast('No spheres remaining!');return;}
  spheres--;
  // Sphere bonus chance
  const sr=getBonus('sphereBonus');
  if(Math.random()<0.15+sr)spheres++;
  // Rune sphere click bonus
  const scBonus=getBonus('sphereClick');
  if(scBonus>0&&Math.random()<0.2)spheres+=scBonus;
  updateSpheres();
  const xpGain=(10+getBonus('xpBonus'))*(boosterActive('xp_rush')?3:1);
  gainXP(xpGain);
  generateSeal();
  // Click ripple feel
  canvas.style.filter='brightness(1.18) drop-shadow(0 0 28px rgba(200,169,110,0.3))';
  setTimeout(()=>canvas.style.filter='drop-shadow(0 0 30px rgba(200,169,110,0.08))',120);
});

// ── XP / LEVEL ──────────────────────────────────────────────────────────────
function gainXP(amount){
  xp+=amount;
  const needed=level*100;
  if(xp>=needed){xp-=needed;level++;showToast(`⬆ Level ${level}!`);updateHUD();}
  levelEl.textContent=level;
  xpEl.textContent=Math.floor(xp);
  xpBar.style.width=(xp/Math.max(1,level*100)*100)+'%';
  document.getElementById('profile-level').textContent=level;
  document.getElementById('profile-xp').textContent=Math.floor(xp);
}
function updateSpheres(){sphereEl.textContent=spheres}
function updateSeal(){sealEl.textContent=seal.toFixed(3)}
function updateHUD(){
  updateSpheres(); updateSeal();
  updateBoosterHud();
}

// ── MINING ─────────────────────────────────────────────────────────────────
const MINING_CD=12*3600*1000;
function getMiningYield(){return 0.10*(1+getBonus('miningYield'));}
function updateMiningBtn(){
  const end=parseInt(localStorage.getItem('ms2_miningEnd')||0);
  const left=end-Date.now();
  const fill=document.getElementById('mining-fill');
  const label=document.getElementById('mining-label');
  if(left>0){
    miningBtn.disabled=true;
    const h=Math.floor(left/3600000),m=Math.floor((left%3600000)/60000),s=Math.floor((left%60000)/1000);
    miningBtn.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const pct=Math.max(0,(MINING_CD-left)/MINING_CD*100);
    if(fill)fill.style.width=pct+'%';
    if(label)label.textContent=`Mining… ${Math.round(pct)}% complete`;
  }else{
    miningBtn.disabled=false;
    miningBtn.textContent='Collect Yield';
    if(fill)fill.style.width='100%';
    if(label)label.textContent='Ready to collect!';
  }
}
miningBtn.addEventListener('click',()=>{
  if(miningBtn.disabled)return;
  const yield_=getMiningYield();
  seal+=yield_; updateSeal();
  showToast(`⛏ Mined ${yield_.toFixed(3)} $SEAL`);
  localStorage.setItem('ms2_miningEnd',Date.now()+MINING_CD);
  updateMiningBtn();
});
setInterval(updateMiningBtn,1000);
updateMiningBtn();

// ── QUESTS ──────────────────────────────────────────────────────────────────
function checkQuests(){
  QUESTS_DEFS.forEach(q=>{
    if(questClaimed[q.id]&&!q.repeatable)return;
    const prog=questProgress[q.id]||0;
    const cur=stats[q.track]||0;
    questProgress[q.id]=Math.max(prog,cur);
  });
  const badge=document.getElementById('rune-badge');
  const hasReady=QUESTS_DEFS.some(q=>{
    if(questClaimed[q.id]&&!q.repeatable)return false;
    return (questProgress[q.id]||0)>=q.goal;
  });
}

function buildQuestList(){
  const el=document.getElementById('quest-list');
  el.innerHTML='';
  QUESTS_DEFS.forEach(q=>{
    const prog=questProgress[q.id]||0;
    const done=prog>=q.goal;
    const claimed=questClaimed[q.id]&&!q.repeatable;
    const pct=Math.min(100,prog/q.goal*100);
    const div=document.createElement('div');
    div.className='quest-item'+(done&&!claimed?' complete':'');
    div.innerHTML=`
      <div class="quest-progress-bg" style="transform:scaleX(${pct/100})"></div>
      <div class="quest-icon">${q.icon}</div>
      <div class="quest-body">
        <div class="quest-text">${q.text}</div>
        <div class="quest-prog">${Math.min(prog,q.goal)} / ${q.goal}${claimed?' · Claimed':''}</div>
      </div>
      <div class="quest-reward">+${q.reward.xp}xp${q.reward.spheres?` +${q.reward.spheres}⚡`:''}</div>
      ${done&&!claimed?`<button class="claim-btn" onclick="claimQuest('${q.id}')">Claim</button>`:claimed?`<div class="quest-done">✓</div>`:''}
    `;
    el.appendChild(div);
  });
}

window.claimQuest=function(qid){
  const q=QUESTS_DEFS.find(x=>x.id===qid);
  if(!q)return;
  gainXP(q.reward.xp);
  spheres+=q.reward.spheres||0;
  questClaimed[qid]=true;
  if(q.repeatable)questProgress[qid]=0;
  updateSpheres();
  showToast(`Quest complete! +${q.reward.xp} XP`);
  buildQuestList();
};

// ── RUNE COLLECTION ─────────────────────────────────────────────────────────
function buildRuneGrid(){
  const grid=document.getElementById('rune-collection-grid');
  grid.innerHTML='';
  let filtered=RUNES;
  if(runeFilter==='owned')filtered=RUNES.filter(r=>userRunes.includes(r.id));
  else if(runeFilter==='equipped')filtered=RUNES.filter(r=>userRuneSlots.includes(r.id));
  else if(runeFilter==='Common'||runeFilter==='Rare'||runeFilter==='Epic')filtered=RUNES.filter(r=>r.rarity===runeFilter);
  // Sort: owned first, then by rarity
  filtered.sort((a,b)=>{
    const ao=userRunes.includes(a.id)?1:0,bo=userRunes.includes(b.id)?1:0;
    if(ao!==bo)return bo-ao;
    return RARITY_ORDER[b.rarity]-RARITY_ORDER[a.rarity];
  });
  filtered.forEach(rune=>{
    const owned=userRunes.includes(rune.id);
    const equipped=userRuneSlots.includes(rune.id);
    const cell=document.createElement('div');
    cell.className='rune-card'+(owned?' owned':'')+(equipped?' equipped':'');
    cell.style.setProperty('--rc',rune.color);
    cell.innerHTML=`
      ${equipped?`<div class="equipped-badge">EQUIPPED</div>`:''}
      ${!owned?`<div class="lock-badge">🔒</div>`:''}
      <div class="rune-symbol">${rune.symbol}</div>
      <div class="rune-name">${rune.name}</div>
      <div class="rune-rarity-dot" title="${rune.rarity}"></div>
    `;
    if(owned){
      cell.addEventListener('click',()=>openRuneDetail(rune));
    }
    grid.appendChild(cell);
  });
  document.getElementById('profile-rune-count').textContent=userRunes.length;
  document.getElementById('profile-rune-total').textContent=RUNES.length;
}

window.setRuneFilter=function(btn,filter){
  runeFilter=filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildRuneGrid();
  closeRuneDetail();
};

function openRuneDetail(rune){
  selectedRune=rune;
  const det=document.getElementById('rune-detail');
  const sym=document.getElementById('rd-symbol');
  sym.textContent=rune.symbol; sym.style.color=rune.color; sym.style.textShadow=`0 0 20px ${rune.color}`;
  document.getElementById('rd-name').textContent=rune.name;
  document.getElementById('rd-name').style.color=rune.color;
  const rarEl=document.getElementById('rd-rarity');
  rarEl.textContent=rune.rarity.toUpperCase();
  rarEl.style.color=RARITY_COLORS[rune.rarity];
  document.getElementById('rd-bonus').textContent=rune.bonus;
  buildDetailActions(rune);
  det.classList.add('open');
  closeDeleteConfirm();
  document.getElementById('slot-selector').style.display='none';
  det.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function buildDetailActions(rune){
  const actions=document.getElementById('rd-actions');
  const equipped=userRuneSlots.includes(rune.id);
  const slotIdx=userRuneSlots.indexOf(rune.id);
  actions.innerHTML='';
  if(equipped){
    const unequipBtn=document.createElement('button');
    unequipBtn.className='rd-btn rd-unequip';
    unequipBtn.textContent='Unequip';
    unequipBtn.onclick=()=>{
      userRuneSlots[slotIdx]=null;
      showToast(`${rune.name} unequipped`);
      buildRuneGrid(); buildDetailActions(rune); updateRuneSlotsRing();
    };
    actions.appendChild(unequipBtn);
  }else{
    const equipBtn=document.createElement('button');
    equipBtn.className='rd-btn rd-equip';
    equipBtn.textContent='Equip Rune';
    equipBtn.onclick=()=>showSlotSelector(rune);
    actions.appendChild(equipBtn);
  }
  const delBtn=document.createElement('button');
  delBtn.className='rd-btn rd-delete';
  delBtn.textContent='Delete Rune';
  delBtn.onclick=()=>showDeleteConfirm(rune);
  actions.appendChild(delBtn);
}

function showSlotSelector(rune){
  const ss=document.getElementById('slot-selector');
  const pickers=document.getElementById('slot-pickers');
  ss.style.display='flex';
  pickers.innerHTML='';
  for(let i=0;i<3;i++){
    const existing=userRuneSlots[i]?RUNES.find(r=>r.id===userRuneSlots[i]):null;
    const btn=document.createElement('div');
    btn.className='slot-picker'+(existing?' has-rune':'');
    btn.title=existing?`Replace ${existing.name}`:`Empty slot ${i+1}`;
    btn.style.borderColor=existing?existing.color:'';
    btn.textContent=existing?existing.symbol:'·';
    btn.style.fontSize='1.4em';
    btn.style.color=existing?existing.color:'var(--text-dim)';
    btn.onclick=()=>{
      userRuneSlots[i]=rune.id;
      stats.runesEquipped=userRuneSlots.filter(Boolean).length;
      showToast(`${rune.name} equipped in slot ${i+1}`);
      document.getElementById('slot-selector').style.display='none';
      buildRuneGrid(); buildDetailActions(rune); updateRuneSlotsRing(); checkQuests();
    };
    pickers.appendChild(btn);
  }
}

function showDeleteConfirm(rune){
  const dc=document.getElementById('delete-confirm');
  document.getElementById('dc-text').textContent=`Delete "${rune.name}"? This cannot be undone. The rune will be lost forever.`;
  document.getElementById('dc-yes').onclick=()=>deleteRune(rune);
  dc.classList.add('open');
  document.getElementById('slot-selector').style.display='none';
}

window.closeDeleteConfirm=function(){
  document.getElementById('delete-confirm').classList.remove('open');
};

function deleteRune(rune){
  userRunes=userRunes.filter(id=>id!==rune.id);
  userRuneSlots=userRuneSlots.map(id=>id===rune.id?null:id);
  showToast(`${rune.name} deleted`);
  closeDeleteConfirm();
  closeRuneDetail();
  buildRuneGrid(); updateRuneSlotsRing();
}

function closeRuneDetail(){
  document.getElementById('rune-detail').classList.remove('open');
  document.getElementById('slot-selector').style.display='none';
  selectedRune=null;
}

// ── CHESTS ──────────────────────────────────────────────────────────────────
function buildChestList(){
  const el=document.getElementById('chest-list');
  el.innerHTML='';
  CHESTS.forEach(chest=>{
    const cnt=userChests[chest.type]||0;
    const disc=getDiscount();
    const price=Math.round(chest.price*(1-disc));
    const row=document.createElement('div');
    row.className='chest-row';
    row.innerHTML=`
      <div class="chest-icon">${chest.icon}</div>
      <div class="chest-info">
        <div class="chest-name">${chest.label}</div>
        <div class="chest-rarity" style="color:${chest.color}">${chest.pool.join(' / ')}</div>
        <div class="chest-count">Owned: ${cnt} · ${price}⚡${disc>0?` <span style="color:var(--green);font-size:9px">(-${Math.round(disc*100)}%)</span>`:''}</div>
      </div>
      <div class="chest-btns">
        <button class="chest-open-btn" ${cnt===0?'disabled':''} onclick="openChest('${chest.type}')">Open</button>
        <button class="chest-buy-btn" onclick="buyChest('${chest.type}',${price})">Buy</button>
      </div>`;
    el.appendChild(row);
  });
  const cb=document.getElementById('chest-badge');
  const total=Object.values(userChests).reduce((a,b)=>a+b,0);
  cb.classList.toggle('show',total>0);
}

window.buyChest=function(type,price){
  if(spheres<price){showToast('Not enough spheres!');return;}
  spheres-=price; updateSpheres();
  userChests[type]=(userChests[type]||0)+1;
  showToast(`${CHESTS.find(c=>c.type===type).label} acquired!`);
  buildChestList();
};

window.openChest=function(type){
  if(!(userChests[type]>0))return;
  const chest=CHESTS.find(c=>c.type===type);
  let pool=[];
  chest.pool.forEach((rarity,i)=>{
    const avail=RUNES.filter(r=>r.rarity===rarity&&!userRunes.includes(r.id));
    const weight=Math.round(chest.chances[i]*100);
    for(let j=0;j<weight;j++)pool.push(...avail);
  });
  if(!pool.length){
    // Give spheres refund instead
    const ref=CHESTS.find(c=>c.type===type).price;
    spheres+=ref; updateSpheres();
    userChests[type]--;
    showToast('All runes collected! Refunded spheres.');
    buildChestList(); return;
  }
  const rune=pool[Math.floor(Math.random()*pool.length)];
  userRunes.push(rune.id);
  userChests[type]--;
  stats.chestsOpened++;
  checkQuests();
  buildChestList(); buildRuneGrid();
  const res=document.getElementById('chest-result');
  res.style.display='block';
  res.style.borderColor=rune.color;
  res.innerHTML=`
    <div class="cr-symbol" style="color:${rune.color};text-shadow:0 0 24px ${rune.color}">${rune.symbol}</div>
    <div class="cr-name" style="color:${rune.color}">${rune.name}</div>
    <div style="font-size:10px;letter-spacing:2px;color:${RARITY_COLORS[rune.rarity]};margin-bottom:4px">${rune.rarity.toUpperCase()}</div>
    <div class="cr-bonus">${rune.bonus}</div>`;
  spawnParticles(rune.symbol,rune.color,4);
  setTimeout(()=>{res.style.display='none';},4000);
};

// ── SHOP ────────────────────────────────────────────────────────────────────
window.shopTab=function(btn,tab){
  document.querySelectorAll('#shop-panel .ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('shop-spheres').style.display=tab==='spheres'?'block':'none';
  document.getElementById('shop-boosters').style.display=tab==='boosters'?'block':'none';
};

function buildShop(){
  const el=document.getElementById('shop-items');
  el.innerHTML='<div class="shop-section-title">Sphere Packs</div>';
  SHOP_ITEMS.forEach(item=>{
    el.innerHTML+=`
      <div class="shop-item">
        <div class="item-info">
          <span class="item-name">${item.spheres} Spheres</span>
          <span class="item-price">${item.price}</span>
        </div>
        <button class="shop-btn" onclick="startPayment(${item.spheres},'${item.price}')">Buy</button>
      </div>`;
  });
  const bl=document.getElementById('booster-items');
  bl.innerHTML='<div class="shop-section-title">Arcane Boosters</div>';
  BOOSTERS.forEach(b=>{
    const disc=getDiscount();
    const price=Math.round(b.price*(1-disc));
    const active=boosterActive(b.id);
    bl.innerHTML+=`
      <div class="booster-item">
        <div class="booster-icon">${b.icon}</div>
        <div class="booster-info">
          <div class="booster-name">${b.name}</div>
          <div class="booster-desc">${b.desc}</div>
          <div class="booster-price">${price}⚡${disc>0?` <span style="color:var(--green);font-size:9px">(-${Math.round(disc*100)}%)</span>`:''}</div>
        </div>
        <button class="booster-btn" onclick="buyBooster('${b.id}',${price})" ${active?'disabled style="opacity:0.5"':''}>
          ${active?'Active':'Get'}
        </button>
      </div>`;
  });
}

window.buyBooster=function(id,price){
  if(spheres<price){showToast('Not enough spheres!');return;}
  const b=BOOSTERS.find(x=>x.id===id);
  if(!b)return;
  spheres-=price; updateSpheres();
  if(b.duration>0){
    activeBoosters[id]={end:Date.now()+b.duration*1000,icon:b.icon,name:b.name};
    showToast(`${b.name} activated!`);
  }else{
    // instant effect
    if(id==='sphere_rain'){spheres+=50;updateSpheres();showToast('🌊 +50 Spheres!');}
  }
  buildShop(); updateBoosterHud();
};

// ── PAYMENT ─────────────────────────────────────────────────────────────────
let paymentAmt=0;
window.startPayment=function(amt,price){
  paymentAmt=amt;
  document.getElementById('pm-spheres').textContent=amt;
  document.getElementById('pm-detail').textContent=`Cost: ${price}`;
  document.getElementById('pm-result').textContent='';
  document.getElementById('pm-confirm').disabled=false;
  document.getElementById('payment-overlay').classList.add('open');
};
window.closePayment=function(){document.getElementById('payment-overlay').classList.remove('open');};
document.getElementById('pm-confirm').addEventListener('click',function(){
  this.disabled=true;
  document.getElementById('pm-result').textContent='Processing…';
  setTimeout(()=>{
    spheres+=paymentAmt; updateSpheres();
    document.getElementById('pm-result').textContent=`✓ ${paymentAmt} spheres added!`;
    setTimeout(closePayment,1500);
  },1200);
});

// ── PROFILE STATS ────────────────────────────────────────────────────────────
function updateProfileStats(){
  const el=document.getElementById('profile-stats');
  el.innerHTML=`
    <div class="stat-card"><div class="sc-val">${stats.total}</div><div class="sc-label">Total Seals</div></div>
    <div class="stat-card"><div class="sc-val">${seal.toFixed(3)}</div><div class="sc-label">$SEAL Balance</div></div>
    <div class="stat-card" style="--sc-color:#00d4ff"><div class="sc-val">${stats.rare}</div><div class="sc-label">Rare</div></div>
    <div class="stat-card" style="--sc-color:#c084fc"><div class="sc-val">${stats.mythic}</div><div class="sc-label">Mythic</div></div>
    <div class="stat-card" style="--sc-color:#ffd700"><div class="sc-val">${stats.legendary}</div><div class="sc-label">Legendary</div></div>
    <div class="stat-card" style="--sc-color:#b0e0ff"><div class="sc-val">${stats.ethereal}</div><div class="sc-label">Ethereal</div></div>
    <div class="stat-card" style="--sc-color:#ff8844"><div class="sc-val">${stats.maxStreak}</div><div class="sc-label">Best Chain</div></div>
    <div class="stat-card" style="--sc-color:#9b59ff"><div class="sc-val">${userRunes.length}</div><div class="sc-label">Runes</div></div>
  `;
}

// ── PANELS ────────────────────────────────────────────────────────────────────
window.openPanel=function(id){
  document.querySelectorAll('.panel-overlay').forEach(p=>p.classList.remove('open'));
  document.getElementById(id).classList.add('open');
  if(id==='runes-panel'){buildRuneGrid();closeRuneDetail();}
  if(id==='profile-panel'){updateProfileStats();updateMiningBtn();}
  if(id==='chest-panel'){buildChestList();}
  if(id==='shop-panel'){buildShop();}
  if(id==='quests-panel'){buildQuestList();}
};
window.closePanel=function(id){document.getElementById(id).classList.remove('open');};
window.closeIfBg=function(e,el){if(e.target===el)el.classList.remove('open');};
document.getElementById('avatar-btn').addEventListener('click',()=>openPanel('profile-panel'));

// ── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── RUNE VISIBILITY TOGGLE ───────────────────────────────────────────────────
let runesVisible=true;
const runeToggleBtn=document.getElementById('rune-toggle-btn');
runeToggleBtn.addEventListener('click',()=>{
  runesVisible=!runesVisible;
  slotsRing.classList.toggle('hidden',!runesVisible);
  runeToggleBtn.classList.toggle('runes-hidden',!runesVisible);
  runeToggleBtn.textContent=runesVisible?'ᚠ':'○';
  runeToggleBtn.title=runesVisible?'Hide runes':'Show runes';
  showToast(runesVisible?'Runes visible':'Runes hidden');
});

// ── INIT ────────────────────────────────────────────────────────────────────
buildRuneSlotsRing();
buildShop();
buildChestList();
buildQuestList();
updateSpheres();
updateSeal();
updateProfileStats();
checkQuests();
gainXP(0);
generateSeal();
render();

})();
</script>
</body>
</html>
